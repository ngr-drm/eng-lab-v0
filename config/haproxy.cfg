global
    maxconn 4096
    nbthread 4

defaults
    mode http
    option dontlognull
    option http-keep-alive
    # Generous timeouts: under burst load (603 VUs) any GC pause or CPU throttle
    # in the upstream Java instances can easily exceed 1.5s. Returning 504 to k6
    # because of a transient blip is the #1 cause of POST /payments "timeout"
    # reports — even when the request would have completed in <100ms.
    timeout connect 1s
    timeout client  6s
    timeout server  6s
    timeout queue   5s
    timeout http-keep-alive 5s

frontend rinha_frontend
    bind *:80
    default_backend servers

backend servers
    balance leastconn
    http-reuse always
    option httpchk GET /health
    http-check expect status 200
    server instance-1 instance-1:8080 check inter 3s fall 3 rise 1 maxconn 1024
    server instance-2 instance-2:8080 check inter 3s fall 3 rise 1 maxconn 1024
