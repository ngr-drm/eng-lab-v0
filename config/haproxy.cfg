global
     maxconn 4096
     nbthread 1

defaults
    mode http
    timeout connect 2s
    timeout client  10s
    timeout server  10s

frontend rinha_frontend
    bind *:80
    default_backend servers

backend servers
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server instance-1 instance-1:8080 check inter 3s fall 2 rise 1
    server instance-2 instance-2:8080 check inter 3s fall 2 rise 1
