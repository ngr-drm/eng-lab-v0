spring:
  application:
    name: api
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      lettuce:
        pool:
          max-active: 30
          max-idle: 15
          min-idle: 5
  main:
    lazy-initialization: false
    banner-mode: off

server:
  port: 8080
  shutdown: graceful
  tomcat:
    threads:
      # With spring.threads.virtual.enabled=true this is a concurrency semaphore
      # over virtual-thread workers, not a real thread pool. Keep it high so we
      # do not artificially throttle inbound POST /payments under burst load
      # (603 VUs). VTs are cheap; the real bottleneck is CPU, not this limit.
      max: 300
    accept-count: 500
    max-connections: 2048

spring.lifecycle.timeout-per-shutdown-phase: 30s


payment:
  processor:
    default:
      url: ${PROCESSOR_DEFAULT_URL:http://localhost:8001}
    fallback:
      url: ${PROCESSOR_FALLBACK_URL:http://localhost:8002}

logging:
  file:
    name: audit.log
  level:
    root: WARN
    # Keep at WARN under load: every INFO line is a synchronous disk write,
    # which pins the virtual-thread carrier (only 8 carriers on the M1).
    # Flip to INFO locally for debugging.
    com.rinha: WARN
