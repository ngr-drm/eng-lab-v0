spring:
  application:
    name: api
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      lettuce:
        pool:
          max-active: 30
          max-idle: 15
          min-idle: 5
  main:
    lazy-initialization: false
    banner-mode: off

server:
  port: 8080
  shutdown: graceful
  tomcat:
    threads:
      max: 50
    accept-count: 256
    max-connections: 1024

spring.lifecycle.timeout-per-shutdown-phase: 30s


payment:
  processor:
    default:
      url: ${PROCESSOR_DEFAULT_URL:http://localhost:8001}
    fallback:
      url: ${PROCESSOR_FALLBACK_URL:http://localhost:8002}

logging:
  file:
    name: audit.log
  level:
    root: WARN
    com.rinha: INFO
