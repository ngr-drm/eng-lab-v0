spring:
  application:
    name: api
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      lettuce:
        pool:
          max-active: 80
          max-idle: 30
          min-idle: 10
  main:
    lazy-initialization: false

server:
  port: 8080
  shutdown: graceful
  tomcat:
    threads:
      max: 200
    accept-count: 1000
    max-connections: 16384

spring.lifecycle.timeout-per-shutdown-phase: 30s

management:
  endpoints:
    enabled-by-default: false
  endpoint:
    health:
      enabled: true

payment:
  processor:
    default:
      url: ${PROCESSOR_DEFAULT_URL:http://localhost:8001}
    fallback:
      url: ${PROCESSOR_FALLBACK_URL:http://localhost:8002}

logging:
  file:
    name: audit.log
  level:
    root: WARN
    com.rinha: INFO
